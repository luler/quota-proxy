services:
  quota_middleware:
    build: .
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - ./runtime:/app/runtime
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      - redis
    networks:
      - quota_network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - quota_network

networks:
  quota_network:
    driver: bridge

volumes:
  redis_data: